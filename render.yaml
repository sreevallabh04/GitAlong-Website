services:
  - type: web
    name: gitalong-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://gitalong.vercel.app,http://localhost:3000
      - key: DEBUG
        value: "false"
      - key: APP_NAME
        value: GitAlong API
      - key: APP_VERSION
        value: 1.0.0
      - key: RECOMMENDATION_LIMIT
        value: "20"
      - key: CANDIDATE_POOL_MULTIPLIER
        value: "5"
